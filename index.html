<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<h2>LOGIN</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="heslo">

<br><br>

<button id="btnLogin">PRIHLÁSIŤ SA</button>

<script>
  const SUPABASE_URL = "https://scwcrynxlamuapxaykzq.supabase.co";
  const SUPABASE_KEY = "sb_publishable_a1CGB9FNW40_G5twPH-jlw_7zVV9-O5";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById("btnLogin").addEventListener("click", async () => {
    alert("CLICK"); // 👈 MUSÍ sa zobraziť

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await sb.auth.signInWithPassword({ email, password });

    alert(error ? error.message : "LOGIN OK");
  });
</script>

</body>
</html>
