<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Test login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<h2>LOGIN TEST</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="heslo">

<br><br>

<button id="btnRegister">REGISTRÁCIA</button>
<button id="btnLogin">PRIHLÁSIŤ SA</button>


<script>
  const SUPABASE_URL = "https://scwcrynxlamuapxaykzq.supabase.co";
  const SUPABASE_KEY = "sb_publishable_a1CGB9FNW40_G5twPH-jlw_7zVV9-O5";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Registrácia
  document.getElementById("btnRegister").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await sb.auth.signUp({ email, password });
    if (error) alert(error.message);
  });

  // Prihlásenie
  document.getElementById("btnLogin").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
  });

  // ✅ TOTO TAM TERAZ CHÝBA – UI PREPÍNANIE
  sb.auth.onAuthStateChange((_event, session) => {
    if (session) {
      document.getElementById("login").style.display = "none";
      document.getElementById("afterLogin").style.display = "block";
      document.getElementById("loggedEmail").textContent = session.user.email;

      document.getElementById("tallyVote").style.display = "block";

      if (window.Tally) {
        Tally.loadEmbeds();
      }
    }
  });
</script>

</body>
</html>
